<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS VULT Cloud</title>
    <style>
        :root { --primary: #e11d48; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; text-align: center; }
        .header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 30px; }
        .add-btn { padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #334155; display: flex; flex-direction: column; text-align: left; position: relative; }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .card-info { padding: 15px; }
        .card-title { font-weight: 600; margin-bottom: 5px; }
        .card-actress { color: var(--accent); font-size: 13px; margin-bottom: 15px; }
        .btn-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 13px; }
        .loading { font-style: italic; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>IPS VULT CLOUD</h1>
        <small>Sincronizado con Google Drive</small>
    </div>

    <button class="add-btn" id="btnAgregar" onclick="addNewItem()">+ AGREGAR A DRIVE</button>
    <p id="status" class="loading"></p>

    <div class="grid" id="galleryGrid"></div>
</div>

<script>
    // --- PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZe0oOj7GSUySt0hS-0BCNlsMCYOIeaAMlLPeInXHvbAuR96LJXSi0GbMFxSM7IEU9/exec";

    document.addEventListener('DOMContentLoaded', loadItems);

    async function addNewItem() {
        const videoUrl = prompt("1/4 - URL del Video:");
        if (!videoUrl) return;
        const imageUrl = prompt("2/4 - URL de la Portada:");
        const title = prompt("3/4 - ID del Video:");
        const actress = prompt("4/4 - Nombre de la Actriz:");

        const item = { videoUrl, imageUrl, title, actress };
        
        document.getElementById('status').innerText = "Guardando en Google Sheets...";
        document.getElementById('btnAgregar').disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Necesario para Google Scripts
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(item)
            });
            
            alert("Guardado con éxito. Los cambios pueden tardar unos segundos en aparecer.");
            location.reload(); 
        } catch (e) {
            alert("Error al guardar.");
            console.error(e);
        }
    }

    async function loadItems() {
        document.getElementById('status').innerText = "Cargando desde la nube...";
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            renderItems(data);
            document.getElementById('status').innerText = "";
        } catch (e) {
            document.getElementById('status').innerText = "Error al conectar con Drive.";
        }
    }

    function renderItems(items) {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        items.forEach(row => {
            // Estructura de columnas en el Excel: [URL, Portada, ID, Actriz]
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img class="card-img" src="${row[1]}" onerror="this.src='https://via.placeholder.com/400x300?text=Error+Imagen'">
                <div class="card-info">
                    <div class="card-title">${row[2]}</div>
                    <div class="card-actress">👤 ${row[3]}</div>
                    <div style="text-align:right">
                        <a class="btn-link" href="${row[0]}" target="_blank">ABRIR →</a>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>

</body>
</html>
