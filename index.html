<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ipsycom Personal Vault</title>
    <style>
        :root { --primary: #e11d48; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --edit: #f59e0b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primary); letter-spacing: 2px; }
        
        .add-section { text-align: center; margin-bottom: 30px; }
        .add-btn { padding: 15px 40px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.4); transition: 0.3s; }
        .add-btn:hover { transform: scale(1.05); background: #f43f5e; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.3s; position: relative; display: flex; flex-direction: column; border: 1px solid #334155; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        
        .card-media-wrapper { width: 100%; height: 200px; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .img-error-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: #94a3b8; display: none; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; text-align: center; padding: 10px; box-sizing: border-box; }
        .card img.error + .img-error-overlay { display: flex; }
        .card img.error { opacity: 0; }

        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 15px; min-height: 42px; }
        
        .card-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #334155; padding-top: 12px; }
        .btn-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 13px; }
        .btn-edit { background: none; border: 1px solid var(--edit); color: var(--edit); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-edit:hover { background: var(--edit); color: white; }

        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(220, 38, 38, 0.9); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; font-size: 16px; opacity: 0.6; transition: 0.3s; }
        .delete-btn:hover { opacity: 1; transform: rotate(90deg); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>IPS VULT</h1>
        <small>Bóveda Privada - Ipsycom Cajamarca</small>
    </div>

    <div class="add-section">
        <button class="add-btn" onclick="addNewItem()">+ AGREGAR NUEVO</button>
    </div>

    <div class="grid" id="galleryGrid"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadItems);

    function addNewItem() {
        const videoUrl = prompt("1/3 - URL del Video/Página:", "");
        if (!videoUrl) return;
        const imageUrl = prompt("2/3 - URL de la Portada (JPG/PNG):", "");
        const videoTitle = prompt("3/3 - Título / Actriz:", "");

        const item = {
            id: Date.now(),
            videoUrl: videoUrl,
            imageUrl: imageUrl || '',
            title: videoTitle || "Sin título"
        };

        let items = getStorage();
        items.unshift(item);
        saveStorage(items);
        renderItems(items);
    }

    // NUEVA FUNCIÓN: EDITAR
    function editItem(id) {
        let items = getStorage();
        let item = items.find(i => i.id === id);
        
        if (item) {
            const newUrl = prompt("Editar URL del Video:", item.videoUrl);
            const newImg = prompt("Editar URL de la Portada:", item.imageUrl);
            const newTitle = prompt("Editar Título / Actriz:", item.title);

            if (newUrl !== null) item.videoUrl = newUrl;
            if (newImg !== null) item.imageUrl = newImg;
            if (newTitle !== null) item.title = newTitle;

            saveStorage(items);
            renderItems(items);
        }
    }

    function deleteItem(id) {
        if(!confirm("¿Eliminar este registro?")) return;
        let items = getStorage().filter(i => i.id !== id);
        saveStorage(items);
        renderItems(items);
    }

    function getStorage() {
        return JSON.parse(localStorage.getItem('ipsycomVault') || '[]');
    }

    function saveStorage(items) {
        localStorage.setItem('ipsycomVault', JSON.stringify(items));
    }

    function handleImgError(img) {
        img.classList.add('error');
    }

    function renderItems(items) {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = '';

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteItem(${item.id})">×</button>
                <div class="card-media-wrapper">
                    <img src="${item.imageUrl}" onerror="handleImgError(this)">
                    <div class="img-error-overlay">
                        <span>🖼️⛔</span>
                        <b>Imagen no disponible</b>
                        <small>Bloqueada por el sitio origen</small>
                    </div>
                </div>
                <div class="card-info">
                    <div class="card-title">${item.title}</div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="editItem(${item.id})">EDITAR</button>
                        <a class="btn-link" href="${item.videoUrl}" target="_blank">ABRIR →</a>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>

</body>
</html>
